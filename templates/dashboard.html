<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Masonite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Masonite · Rojizo / Terracota / Cobre */
      --navy:      #3a0d0d;
      --navy-2:    #5e1414;
      --navy-3:    #8b1a1a;
      --primary:   #b22222;
      --primary-l: #c0392b;
      --accent:    #d4af37;
      --gold:      #c59b27;
      --gold-lt:   #e6b800;
      --ink:       #2c0e0e;
      --muted:     #7f4c4c;
      --muted-lt:  #a16a6a;
      --bg:        #fcf6f5;
      --surface:   #ffffff;
      --surface-2: #fdf3f2;
      --border:    #e0c0b8;
      --border-2:  #c9a79b;
      --success:   #1e7e34;
      --danger:    #a71d2a;
      --warn:      #a65d1a;
      --info:      #1d4ed8;
      --shadow-sm: 0 2px 8px rgba(60, 10, 10, .06);
      --shadow-md: 0 8px 24px rgba(80, 20, 20, .10);
      --shadow-lg: 0 20px 50px rgba(60, 10, 10, .14);
      --radius-sm: 10px;
      --radius:    14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --transition: 0.2s cubic-bezier(.4,0,.2,1);
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; font-size:15px; line-height:1.5; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--navy);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 1px 0 rgba(180, 40, 40, 0.2), var(--shadow-lg);
      border-bottom: 2px solid var(--primary);
    }
    .brand-left { display:flex; align-items:center; gap:14px; }
    .logo-mini {
      width:40px; height:40px; border-radius:10px;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:18px; font-weight:800; letter-spacing:-1px;
      box-shadow:0 4px 14px rgba(180, 40, 40, .4);
    }
    .brand-copy small { display:block; color:var(--muted-lt); font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
    .brand-copy h2 { color:#fff; font-size:17px; font-weight:700; letter-spacing:-.3px; }
    .brand-copy h2 span { color: var(--gold-lt); }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .user-chip {
      display:flex; align-items:center; gap:10px;
      background:rgba(180, 40, 40, 0.2); border:1px solid rgba(200, 70, 70, 0.3);
      border-radius:999px; padding:5px 14px 5px 6px;
    }
    .user-avatar {
      width:30px; height:30px; border-radius:50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:800; color:var(--navy);
    }
    .user-chip span { color:rgba(255,255,255,.9); font-size:13px; font-weight:500; }
    .logout-btn {
      border:none; background:rgba(180, 40, 40, 0.3); color:#fff;
      border-radius:999px; padding:7px 16px; cursor:pointer; font-size:13px; font-weight:600;
      font-family:inherit; transition:background var(--transition), color var(--transition); text-decoration:none;
      border: 1px solid rgba(255,215,0,0.2);
    }
    .logout-btn:hover { background:rgba(200, 50, 50, 0.6); color:#fff; }

    /* ── NAV ── */
    .main-nav {
      background: var(--navy-2);
      padding: 0 32px; display:flex; gap:2px;
      border-bottom:1px solid rgba(180, 40, 40, 0.2);
    }
    .nav-item { position:relative; }
    .nav-link {
      background:transparent; color:rgba(255, 220, 200, 0.8); border:none;
      padding:13px 18px; font-size:13.5px; font-weight:600; font-family:inherit;
      cursor:pointer; border-bottom:2px solid transparent;
      transition:color var(--transition), border-color var(--transition);
      white-space:nowrap; display:flex; align-items:center; gap:6px;
    }
    .nav-link:hover, .nav-link.active { color:#fff; border-bottom-color:var(--gold); }
    .dropdown-menu {
      display:none; position:absolute; top:calc(100% + 1px); left:0;
      min-width:220px; background:var(--surface); border:1px solid var(--border);
      border-radius:0 var(--radius) var(--radius) var(--radius); box-shadow:var(--shadow-lg); overflow:hidden; z-index:300;
    }
    .nav-item:hover .dropdown-menu { display:block; }
    .dropdown-link {
      width:100%; border:none; background:transparent; color:var(--ink); text-align:left;
      padding:11px 18px; cursor:pointer; font-size:13.5px; font-weight:500; font-family:inherit;
      border-bottom:1px solid var(--border); transition:background var(--transition), color var(--transition), padding-left var(--transition);
      display:flex; align-items:center; gap:8px; text-decoration:none;
    }
    .dropdown-link:last-child { border-bottom:none; }
    .dropdown-link:hover, .dropdown-link.active { background:var(--surface-2); color:var(--primary); padding-left:22px; }

    /* ── LAYOUT ── */
    .main-content { padding:28px 32px; max-width:1400px; margin:0 auto; }
    .breadcrumb {
      display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; font-weight:500;
      margin-bottom:20px; padding:9px 16px; background:var(--surface);
      border-radius:var(--radius-sm); border:1px solid var(--border); width:fit-content;
    }
    .crumb-link { color:var(--primary); font-weight:600; cursor:pointer; text-decoration:none; transition:color var(--transition); }
    .crumb-link:hover { color:var(--primary-l); }
    .breadcrumb span { color:var(--muted); }
    .breadcrumb-sep { color:var(--border-2); }

    /* ── CARDS ── */
    .module-card { background:var(--surface); border-radius:var(--radius-lg); padding:28px; box-shadow:var(--shadow-md); border:1px solid var(--border); }
    .module-header {
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:16px; flex-wrap:wrap; margin-bottom:24px; padding-bottom:20px; border-bottom:2px solid var(--border-2);
    }
    .module-header h1 { font-size:24px; font-weight:800; color:var(--navy); letter-spacing:-.4px; margin-bottom:4px; }
    .module-header p { color:var(--muted); font-size:13.5px; }

    /* ── WELCOME / DASHBOARD METRICS ── */
    .dashboard-welcome { display:grid; grid-template-columns:1fr 360px; gap:20px; }
    .hero-panel {
      background: linear-gradient(135deg, #3a0d0d 0%, #7a1f1f 60%, #a52a2a 100%);
      border-radius:var(--radius-xl); padding:40px; color:#fff; position:relative; overflow:hidden; box-shadow:var(--shadow-lg);
      border-bottom: 3px solid var(--gold);
    }
    .hero-panel::before {
      content:''; position:absolute; width:320px; height:320px; border-radius:50%;
      background:radial-gradient(circle, rgba(212,175,55,.25) 0%, transparent 65%); top:-80px; right:-60px; pointer-events:none;
    }
    .hero-panel h1 { font-size:36px; font-weight:800; color:#fff; letter-spacing:-.6px; margin-bottom:12px; position:relative; z-index:1; }
    .hero-panel p { color:rgba(255,255,255,.75); font-size:15px; line-height:1.7; max-width:480px; position:relative; z-index:1; }
    .welcome-name {
      display:inline-flex; align-items:center; gap:10px; margin-top:28px;
      background:rgba(180,40,40,.25); border:1px solid rgba(212,175,55,.3);
      color:#fff; padding:10px 18px; border-radius:999px; font-size:14px; font-weight:600; position:relative; z-index:1;
    }
    .welcome-name-dot { width:8px; height:8px; border-radius:50%; background:var(--gold-lt); box-shadow:0 0 8px var(--gold); }
    
    /* Métricas */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }
    .metric-card {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(212,175,55,.2);
      border-radius: var(--radius);
      padding: 18px;
      backdrop-filter: blur(4px);
    }
    .metric-icon {
      font-size: 24px;
      margin-bottom: 10px;
      color: var(--gold-lt);
    }
    .metric-value {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }
    .metric-label {
      font-size: 13px;
      color: rgba(255,255,255,.7);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-top: 4px;
    }
    .metric-trend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 12px;
      color: #a5d6a5;
    }

    .info-panel { background:var(--surface); border-radius:var(--radius-xl); padding:28px; border:1px solid var(--border); box-shadow:var(--shadow-md); }
    .info-panel h3 { color:var(--navy); font-size:15px; font-weight:700; margin-bottom:18px; display: flex; align-items: center; gap: 8px; }
    .info-panel h3 svg { color: var(--primary); }
    .info-list { display:flex; flex-direction:column; gap:11px; }
    .info-item { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px; }
    .info-item-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .info-item-value { font-size:14px; font-weight:500; color:var(--ink); margin-top:2px; }

    /* Quick Stats en panel derecho */
    .quick-stats {
      margin-top: 24px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); font-size: 13px; }
    .stat-number { font-weight: 700; color: var(--primary); font-size: 18px; }

    /* ── FILTERS ── */
    .filter-box { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:20px; }
    .filter-grid { display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; }
    .field { display:flex; flex-direction:column; gap:6px; min-width:200px; flex:1; }
    .field label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .field input, .field select {
      width:100%; height:42px; border:1.5px solid var(--border-2); border-radius:var(--radius-sm);
      padding:0 14px; background:var(--surface); color:var(--ink); font-family:inherit; font-size:14px;
      outline:none; transition:border-color var(--transition), box-shadow var(--transition);
    }
    .field textarea {
      width:100%; min-height:100px; border:1.5px solid var(--border-2); border-radius:var(--radius-sm);
      padding:12px 14px; background:var(--surface); color:var(--ink); font-family:inherit; font-size:14px;
      outline:none; resize:vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(180,40,40,.10); }
    .field input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); }
    .field-full { grid-column:1 / -1; }

    /* ── TABLE ── */
    .table-tools { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
    .table-responsive { overflow:auto; border-radius:var(--radius); border:1px solid var(--border); }
    .data-table { width:100%; border-collapse:collapse; background:var(--surface); }
    .data-table thead th {
      background:var(--navy); color:rgba(255, 240, 235, 0.95); padding:12px 16px;
      text-align:left; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;
      border-bottom: 2px solid var(--gold);
    }
    .data-table tbody td { padding:12px 16px; border-bottom:1px solid var(--border); color:#3a1a1a; font-size:14px; vertical-align:middle; }
    .data-table tbody tr:last-child td { border-bottom:none; }
    .data-table tbody tr { transition:background var(--transition); }
    .data-table tbody tr:hover { background:#fbeae8; }

    /* ── PAGINATION ── */
    .pagination { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-top:22px; }
    .pagination button {
      background:var(--surface); border:1.5px solid var(--border-2); border-radius:var(--radius-sm);
      padding:7px 13px; cursor:pointer; font-weight:600; font-size:13.5px; color:#3a1a1a; font-family:inherit;
      transition:all var(--transition);
    }
    .pagination button:hover:not(:disabled) { background:var(--surface-2); border-color:var(--primary); color:var(--primary); }
    .pagination button:disabled { opacity:.4; cursor:not-allowed; }
    .pagination button.active { background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 4px 12px rgba(180,40,40,.30); }

    /* ── BUTTONS ── */
    .btn {
      border:none; border-radius:var(--radius-sm); padding:8px 16px; font-weight:600; font-size:13px; font-family:inherit;
      cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:5px;
      transition:all var(--transition); white-space:nowrap;
    }
    .btn-success { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(180,40,40,.25); }
    .btn-success:hover { background:var(--navy-3); transform:translateY(-1px); box-shadow:0 5px 14px rgba(180,40,40,.35); }
    .btn-secondary { background:var(--surface); color:var(--muted); border:1.5px solid var(--border-2); }
    .btn-secondary:hover { background:var(--surface-2); color:var(--ink); }
    .btn-primary { background:var(--info); color:#fff; }
    .btn-primary:hover { opacity:.88; }
    .btn-danger { background:#fff0f0; color:var(--danger); border:1.5px solid #fcc; }
    .btn-danger:hover { background:var(--danger); color:#fff; }
    .btn-warning { background:#fff8e7; color:var(--warn); border:1.5px solid #fde68a; }
    .btn-warning:hover { background:var(--warn); color:#fff; }

    /* ── BADGE ── */
    .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; background:rgba(180,40,40,.10); color:var(--primary); border:1px solid rgba(180,40,40,.20); }

    /* ── STATUS PILL ── */
    .status-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:600; }
    .status-pill.active { background:#ecfdf5; color:var(--success); border:1px solid #a7f3d0; }
    .status-pill.inactive { background:#fff7ed; color:var(--warn); border:1px solid #fed7aa; }

    /* ── EMPTY ── */
    .empty { padding:48px 24px; text-align:center; color:var(--muted); font-size:14px; }
    .empty::before { content:'⊘'; display:block; font-size:32px; margin-bottom:10px; opacity:.3; }

    /* ── IMAGES ── */
    .table-image { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--border-2); }
    .detail-image { width:110px; height:110px; border-radius:var(--radius); object-fit:cover; border:2px solid var(--border-2); }

    /* ── FORM ── */
    .form-screen { display:grid; gap:20px; }
    .form-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; }
    .check-card {
      display:flex; align-items:center; gap:10px; padding:13px 16px; border:1.5px solid var(--border-2);
      border-radius:var(--radius); background:var(--surface-2); cursor:pointer; transition:border-color var(--transition), background var(--transition);
      font-size:14px; font-weight:500; color:var(--ink);
    }
    .check-card:hover { border-color:var(--primary); background:#fef0ee; }

    /* ── DETAIL ── */
    .detail-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:14px; }
    .detail-box {
      padding:12px 14px; border:1px solid var(--border); border-radius:var(--radius-sm);
      background:var(--surface-2); font-size:14px; color:var(--ink); word-break:break-word; min-height:44px; display:flex; align-items:center;
    }

    /* ── PERMISSIONS ── */
    .perm-check { width:17px; height:17px; accent-color:var(--primary); cursor:pointer; }
    .actions-inline, .crud-actions, .modal-actions, .table-actions { display:flex; gap:8px; flex-wrap:wrap; }

    /* ── MODALS ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(50,10,10,.6); backdrop-filter:blur(4px);
      display:none; align-items:center; justify-content:center; padding:20px; z-index:999;
    }
    .modal-box {
      width:min(580px, 100%); background:var(--surface); border-radius:var(--radius-xl);
      box-shadow:var(--shadow-lg); overflow:hidden; border:1px solid var(--border);
      animation:modalIn .22s cubic-bezier(.4,0,.2,1);
    }
    .modal-box.modal-sm { width:min(420px, 100%); }
    @keyframes modalIn { from{opacity:0;transform:translateY(16px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .modal-header {
      padding:18px 24px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; gap:10px; background:var(--surface-2);
    }
    .modal-header h2 { color:var(--navy); font-size:17px; font-weight:700; }
    .modal-close {
      border:1.5px solid var(--border-2); background:var(--surface); width:34px; height:34px;
      border-radius:var(--radius-sm); font-weight:700; cursor:pointer; font-size:14px;
      color:var(--muted); transition:all var(--transition);
    }
    .modal-close:hover { background:#fff0f0; color:var(--danger); border-color:#fcc; }
    .modal-body { padding:24px; }
    .modal-body p { color:var(--muted); line-height:1.7; font-size:14.5px; }

    /* ── RESPONSIVE ── */
    @media(max-width:1024px){ .dashboard-welcome{grid-template-columns:1fr} .metrics-grid{grid-template-columns:repeat(2,1fr)} }
    @media(max-width:768px){
      .topbar,.main-nav{padding:0 16px} .main-content{padding:20px 16px}
      .module-card{padding:18px} .form-grid,.detail-grid{grid-template-columns:1fr}
      .data-table{min-width:720px} .hero-panel h1{font-size:26px} .user-chip span{display:none}
      .metrics-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand-left">
      
      <div class="brand-copy">
        <h2>Masonite <span style="font-weight:300;">|</span> Corp</h2>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="user-avatar" id="topUserAvatar">{{ user.strNombreUsuario[0]|upper if user.strNombreUsuario else 'U' }}</div>
      </div>
      <a class="logout-btn" href="/logout">Cerrar sesión</a>
    </div>
  </header>

  <nav class="main-nav" id="mainNav"></nav>

  <main class="main-content">
    <div id="breadcrumbs" class="breadcrumb"><span>Inicio</span></div>
    <div id="moduleContent"></div>
  </main>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="detailModalOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="detailModalTitle">Detalle</h2>
        <button class="modal-close" type="button" onclick="closeDetailModal()">✕</button>
      </div>
      <div class="modal-body" id="detailModalBody"></div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="confirmModalOverlay">
    <div class="modal-box modal-sm">
      <div class="modal-header">
        <h2 id="confirmModalTitle">Confirmación</h2>
        <button class="modal-close" type="button" onclick="closeConfirmModal()">✕</button>
      </div>
      <div class="modal-body">
        <p id="confirmModalMessage"></p>
        <div class="modal-actions" style="justify-content:flex-end;margin-top:22px">
          <button type="button" class="btn btn-secondary" onclick="closeConfirmModal()">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmModalAccept">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATUS MODAL -->
  <div class="modal-overlay" id="statusModalOverlay">
    <div class="modal-box modal-sm">
      <div class="modal-header">
        <h2 id="statusModalTitle">Listo</h2>
        <button class="modal-close" type="button" onclick="closeStatusModal()">✕</button>
      </div>
      <div class="modal-body"><p id="statusModalMessage"></p></div>
    </div>
  </div>

<script>
const APP={
  menus:{{ menus | tojson }},
  permissions:{{ permissions | tojson }},
  initialModule:{{ initial_module | tojson }},
  user:{{ user | tojson }},
  catalogs:null,
  dashboardStats:{{ dashboard_stats | tojson }}, // { totalUsuarios, totalPerfiles, usuariosActivos, modulosActivos, ultimoAcceso }
  state:{view:'home',moduleKey:null,moduleName:'',menuName:'',page:1,search:'',editingId:null,permissionFilterPerfil:'',permissionRows:[],permissionTotalPages:1},
  confirmAction:null,statusTimer:null
};

const schemas={
  perfil:{
    title:'Perfiles',singleTitle:'Perfil',description:'Administración de perfiles del sistema.',
    endpoint:'/api/perfiles',search:true,searchLabel:'Perfil',searchPlaceholder:'Buscar perfil...',
    columns:[
      {key:'strNombrePerfil',label:'Nombre de perfil'},
      {key:'bitAdministrador',label:'Administrador',render:v=>v?'<span class="badge">✓ Sí</span>':'<span style="color:var(--muted)">No</span>'}
    ],
    detailLabels:{strNombrePerfil:'Perfil',bitAdministrador:'Administrador'},
    form:[
      {name:'strNombrePerfil',label:'Nombre del Perfil',type:'text',maxLength:80,required:true},
      {name:'bitAdministrador',label:'Administrador',type:'checkbox'}
    ]
  },
  modulo:{

const moduleRoutes={perfil:'/seguridad/perfil',modulo:'/seguridad/modulo',permisos_perfil:'/seguridad/permisos-perfil',usuario:'/seguridad/usuario'};
function getModuleUrl(mod){return moduleRoutes[mod?.clave]||mod?.ruta||'#';}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function escapeAttr(v){return escapeHtml(v);}
function boolToText(v){return v?'Sí':'No';}
function getPermission(){return APP.permissions[APP.state.moduleKey]||{};}

function renderPagination(totalPages,currentPage,callbackName){
  totalPages=Number(totalPages)||1; currentPage=Number(currentPage)||1;
  if(totalPages<=1) return '';
  let html='';
  html+=`<button ${currentPage===1?'disabled':''} onclick="${callbackName}(${currentPage-1})">‹</button>`;
  for(let i=1;i<=totalPages;i++) html+=`<button class="${i===currentPage?'active':''}" onclick="${callbackName}(${i})">${i}</button>`;
  html+=`<button ${currentPage===totalPages?'disabled':''} onclick="${callbackName}(${currentPage+1})">›</button>`;
  return html;
}

async function loadPermissionRows(page=1){
  const profileId=Number(APP.state.permissionFilterPerfil||0);
  if(!profileId){APP.state.permissionRows=[];APP.state.permissionTotalPages=1;APP.state.page=1;return;}
  const res=await fetch(`/api/permisos-perfil?page=${page}&idPerfil=${profileId}`);
  const json=await res.json();
  APP.state.permissionRows=json.data||[];APP.state.permissionTotalPages=json.totalPages||1;APP.state.page=json.page||page;
}

async function applyPermissionFilters(){
  const pa=document.getElementById('permissionFilterPerfil');
  APP.state.permissionFilterPerfil=pa?pa.value.trim():'';APP.state.page=1;
  await loadPermissionRows(1);
  renderPermissionsTable(schemas.permisos_perfil,APP.state.permissionRows||[],APP.state.permissionTotalPages||1);
}

async function clearPermissionFilters(){
  APP.state.permissionFilterPerfil='';APP.state.page=1;APP.state.permissionRows=[];APP.state.permissionTotalPages=1;
  const pa=document.getElementById('permissionFilterPerfil');if(pa)pa.value='';
  renderPermissionsTable(schemas.permisos_perfil,[],1);
}

async function loadPermissionPage(page){
  APP.state.page=page;await loadPermissionRows(page);
  renderPermissionsTable(schemas.permisos_perfil,APP.state.permissionRows||[],APP.state.permissionTotalPages||1);
}

function setBreadcrumb(){
  const homeLink=APP.initialModule?'/':'javascript:void(0)';
  const homeAction=APP.initialModule?'':' onclick="renderHome()"';
  const crumbs=[`<a href="${homeLink}"${homeAction} class="crumb-link">Inicio</a>`];
  if(APP.state.menuName) crumbs.push(`<span class="breadcrumb-sep">›</span><span>${escapeHtml(APP.state.menuName)}</span>`);
  if(APP.state.moduleName) crumbs.push(`<span class="breadcrumb-sep">›</span><span>${escapeHtml(APP.state.moduleName)}</span>`);
  if(APP.state.view==='create') crumbs.push(`<span class="breadcrumb-sep">›</span><span>Agregar</span>`);
  if(APP.state.view==='edit') crumbs.push(`<span class="breadcrumb-sep">›</span><span>Editar</span>`);
  document.getElementById('breadcrumbs').innerHTML=crumbs.join('');
}

function buildMenus(){
  const nav=document.getElementById('mainNav');
  nav.innerHTML='';
  APP.menus.forEach(menu=>{
    const visible=(menu.modulos||[]).filter(mod=>{
      const p=APP.permissions[mod.clave]||{};
      return p.agregar||p.editar||p.consulta||p.eliminar||p.detalle;
    });
    if(!visible.length) return;
    const item=document.createElement('div');item.className='nav-item';
    const button=document.createElement('button');button.className='nav-link';button.textContent=menu.nombre;
    const dropdown=document.createElement('div');dropdown.className='dropdown-menu';
    visible.forEach(mod=>{
      const link=document.createElement('a');link.className='dropdown-link';link.textContent=mod.nombre;link.href=getModuleUrl(mod);
      dropdown.appendChild(link);
    });
    item.append(button,dropdown);nav.appendChild(item);
  });
}

    try{

    }catch(e){APP.dashboardStats = {totalUsuarios:0,totalPerfiles:0,usuariosActivos:0,modulosActivos:0,ultimoAcceso:'N/A'};}

  buildMenus();
  if(!APP.initialModule||!APP.initialModule.moduleKey) return renderHome();
  APP.state.menuName=APP.initialModule.menuName||'';
  APP.state.moduleName=APP.initialModule.moduleName||'';
  APP.state.moduleKey=APP.initialModule.moduleKey;

}

async function loadList(page=1){
  APP.state.view='list';APP.state.page=page;APP.state.editingId=null;setBreadcrumb();
  const schema=schemas[APP.state.moduleKey];
  if(!schema) return renderStaticModule();
  if(APP.state.moduleKey==='permisos_perfil'){
    await loadPermissionRows(APP.state.page||1);
    renderPermissionsTable(schema,APP.state.permissionRows||[],APP.state.permissionTotalPages||1);return;
  }
  const q=schema.search?`?page=${page}&search=${encodeURIComponent(APP.state.search||'')}`:`?page=${page}`;
  const res=await fetch(schema.endpoint+q);const json=await res.json();
  renderList(schema,json.data||[],json.totalPages||1);
}

async function openCreateForm(){

function renderForm(data={}){
  const schema=schemas[APP.state.moduleKey];
  const title=APP.state.view==='edit'?`Editar ${schema.singleTitle}`:`Agregar ${schema.singleTitle}`;
  const p=getPermission();
  document.getElementById('moduleContent').innerHTML=`

      <form id="entityForm">
        <input type="hidden" name="id" value="${data.id||''}">

        <div class="modal-actions" style="justify-content:flex-end;margin-top:24px">
          <button type="button" class="btn btn-secondary" onclick="loadList(${APP.state.page||1})">Cancelar</button>

        </div>
      </form>
    </div>`;
  document.getElementById('entityForm').onsubmit=saveRecord;
}

function renderField(field,data,schema){
  if(field.type==='checkbox'){
    return `<label class="check-card field-full"><input type="checkbox" name="${field.name}" ${data[field.name]?'checked':''}><span>${escapeHtml(field.label)}</span></label>`;
  }
  if(field.type==='select'){
    const options=(APP.catalogs[field.optionsKey]||[]).map(opt=>`<option value="${opt.id}" ${String(opt.id)===String(data[field.name]||'')?'selected':''}>${escapeHtml(opt[field.textKey]||'')}</option>`).join('');
    return `<div class="field"><label>${escapeHtml(field.label)}</label><select name="${field.name}" ${field.required?'required':''}><option value="">Seleccione...</option>${options}</select></div>`;
  }
  if(field.type==='file'){
    return `<div class="field field-full"><label>${escapeHtml(field.label)}</label><input type="file" name="${field.name}" accept="${field.accept||''}">${data.strImagen?`<div style="margin-top:12px"><img src="${escapeAttr(data.strImagen)}" alt="Foto" class="detail-image"></div>`:''}</div>`;
  }
  if(field.name==='strNumeroCelular'){
    return `<div class="field"><label>${escapeHtml(field.label)}</label><input type="text" name="${field.name}" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" value="${escapeAttr(data[field.name]??'')}" ${field.required?'required':''} oninput="this.value=this.value.replace(/\\D/g,'').slice(0,10)"></div>`;
  }
  return `<div class="field"><label>${escapeHtml(field.label)}</label><input type="${field.type}" name="${field.name}" maxlength="${field.maxLength||''}" value="${escapeAttr(data[field.name]??'')}" ${field.required?'required':''}></div>`;
}

async function saveRecord(e){
  e.preventDefault();
  const schema=schemas[APP.state.moduleKey];
  const id=e.target.querySelector('[name="id"]').value;
  const hasFile=schema.form.some(f=>f.type==='file');
  const method=id?'PUT':'POST';
  let options={method};
  if(hasFile){
    const fd=new FormData(e.target);fd.delete('id');
    schema.form.forEach(field=>{if(field.type==='checkbox')fd.set(field.name,fd.get(field.name)?'true':'false');});
    options.body=fd;
  } else {
    const payload={};
    schema.form.forEach(field=>{const el=e.target.querySelector(`[name="${field.name}"]`);if(!el)return;payload[field.name]=field.type==='checkbox'?el.checked:el.value;});
    options.headers={'Content-Type':'application/json'};options.body=JSON.stringify(payload);
  }
  if(APP.state.moduleKey==='usuario'){
    const phoneInput=e.target.querySelector('[name="strNumeroCelular"]');
    const phone=(phoneInput?.value||'').trim();
    if(!/^\d{10}$/.test(phone)){alert('El número de teléfono debe tener exactamente 10 dígitos.');if(phoneInput)phoneInput.focus();return;}
  }
  const res=await fetch(id?`${schema.endpoint}/${id}`:schema.endpoint,options);
  const json=await res.json();
  if(!res.ok||!json.ok){alert(json.message||'No se pudo guardar');return;}
  if(APP.state.moduleKey==='perfil'){const catRes=await fetch('/api/catalogos/base');APP.catalogs=await catRes.json();}
  showStatusModal('¡Guardado!',id?'El registro se actualizó correctamente.':'El registro se creó correctamente.');
  loadList(id?APP.state.page:1);
}

async function savePermissionRow(button,rowId,idPerfil,idModulo){
  const tr=button.closest('tr');
  const payload={idPerfil,idModulo,bitAgregar:tr.querySelector('[data-field="bitAgregar"]').checked,bitEditar:tr.querySelector('[data-field="bitEditar"]').checked,bitConsulta:tr.querySelector('[data-field="bitConsulta"]').checked,bitEliminar:tr.querySelector('[data-field="bitEliminar"]').checked,bitDetalle:tr.querySelector('[data-field="bitDetalle"]').checked};
  const res=await fetch(`/api/permisos-perfil/${rowId||0}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const json=await res.json();
  if(!res.ok||!json.ok){alert(json.message||'No se pudo guardar');return;}
  showStatusModal('¡Guardado!','Los permisos se actualizaron correctamente.');
  await loadPermissionRows(APP.state.page||1);
  renderPermissionsTable(schemas.permisos_perfil,APP.state.permissionRows||[],APP.state.permissionTotalPages||1);
}

function viewPermRowDetail(btn){
  const raw=btn.getAttribute('data-row')||'{}';
  const data=JSON.parse(raw.replace(/&quot;/g,'"'));
  viewPermissionRecord(data);
}
function viewPermissionRecord(data){
  const html=`<div class="detail-grid">
    <div class="field"><label>Perfil</label><div class="detail-box">${escapeHtml(data.strNombrePerfil||'')}</div></div>
    <div class="field"><label>Módulo</label><div class="detail-box">${escapeHtml(data.strNombreModulo||'')}</div></div>
    <div class="field"><label>Agregar</label><div class="detail-box">${boolToText(!!data.bitAgregar)}</div></div>
    <div class="field"><label>Editar</label><div class="detail-box">${boolToText(!!data.bitEditar)}</div></div>
    <div class="field"><label>Consulta</label><div class="detail-box">${boolToText(!!data.bitConsulta)}</div></div>
    <div class="field"><label>Eliminar</label><div class="detail-box">${boolToText(!!data.bitEliminar)}</div></div>
    <div class="field"><label>Detalle</label><div class="detail-box">${boolToText(!!data.bitDetalle)}</div></div>
  </div>
  <div class="modal-actions" style="justify-content:flex-end;margin-top:22px"><button type="button" class="btn btn-secondary" onclick="closeDetailModal()">Cerrar</button></div>`;
  openDetailModal('Detalle de permiso',html);
}

function confirmPermissionDelete(id){
  openConfirmModal('Confirmar eliminación','¿Deseas eliminar este registro de permisos?',async()=>{
    const res=await fetch(`/api/permisos-perfil/${id}`,{method:'DELETE'});const json=await res.json();
    if(!res.ok||!json.ok){alert(json.message||'No se pudo eliminar');return;}
    closeConfirmModal();showStatusModal('Eliminado','El permiso se eliminó correctamente.');
    await loadPermissionRows(APP.state.page||1);
    renderPermissionsTable(schemas.permisos_perfil,APP.state.permissionRows||[],APP.state.permissionTotalPages||1);
  });
}

function normalizeDetailValue(key,value){
  if(key==='bitAdministrador'||key.startsWith('bit')) return boolToText(!!value);
  if(key==='strImagen') return value?`<img src="${escapeAttr(value)}" alt="Imagen" class="detail-image">`:'Sin foto';
  if(key==='idPerfil'){const item=(APP.catalogs.perfiles||[]).find(x=>String(x.id)===String(value));return escapeHtml(item?.strNombrePerfil||value||'');}
  if(key==='idEstadoUsuario'){const item=(APP.catalogs.estados||[]).find(x=>String(x.id)===String(value));return escapeHtml(item?.strNombreEstado||value||'');}
  return escapeHtml(value??'');
}

async function viewRecord(id){
  const schema=schemas[APP.state.moduleKey];const data=await getRecord(id);
  const hiddenKeys=APP.state.moduleKey==='permisos_perfil'?['idPerfil','idModulo']:[];
  const keys=Object.keys(data).filter(k=>k!=='id'&&!hiddenKeys.includes(k));
  const html=`<div class="detail-grid">
    ${keys.map(key=>`<div class="field ${key==='strImagen'?'field-full':''}"><label>${escapeHtml(schema.detailLabels?.[key]||key)}</label><div class="detail-box">${normalizeDetailValue(key,data[key])}</div></div>`).join('')}
  </div>
  <div class="modal-actions" style="justify-content:flex-end;margin-top:22px"><button type="button" class="btn btn-secondary" onclick="closeDetailModal()">Cerrar</button></div>`;
  openDetailModal(`Detalle de ${schema.singleTitle}`,html);
}

function confirmDelete(id){
  openConfirmModal('Confirmar eliminación','¿Estás seguro de que deseas eliminar este registro? Esta acción no se puede deshacer.',async()=>{
    const schema=schemas[APP.state.moduleKey];
    const res=await fetch(`${schema.endpoint}/${id}`,{method:'DELETE'});const json=await res.json();
    if(!res.ok||!json.ok){alert(json.message||'No se pudo eliminar');return;}
    closeConfirmModal();showStatusModal('Eliminado','El registro se eliminó correctamente.');loadList(APP.state.page);
  });
}

function openDetailModal(title,html){document.getElementById('detailModalTitle').textContent=title;document.getElementById('detailModalBody').innerHTML=html;document.getElementById('detailModalOverlay').style.display='flex';}
function closeDetailModal(){document.getElementById('detailModalOverlay').style.display='none';document.getElementById('detailModalBody').innerHTML='';}
function openConfirmModal(title,message,onAccept){document.getElementById('confirmModalTitle').textContent=title;document.getElementById('confirmModalMessage').textContent=message;APP.confirmAction=onAccept;document.getElementById('confirmModalOverlay').style.display='flex';}
function closeConfirmModal(){document.getElementById('confirmModalOverlay').style.display='none';APP.confirmAction=null;}
document.getElementById('confirmModalAccept').addEventListener('click',()=>{if(APP.confirmAction)APP.confirmAction();});
function showStatusModal(title,message){document.getElementById('statusModalTitle').textContent=title;document.getElementById('statusModalMessage').textContent=message;document.getElementById('statusModalOverlay').style.display='flex';clearTimeout(APP.statusTimer);APP.statusTimer=setTimeout(closeStatusModal,2000);}
function closeStatusModal(){document.getElementById('statusModalOverlay').style.display='none';}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.style.display='none';}));

boot();
</script>
</body>
</html>
