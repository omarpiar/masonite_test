<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Error {{ code }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f0f4f9;min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{background:#fff;border-radius:20px;padding:48px;text-align:center;box-shadow:0 20px 60px rgba(0,40,100,.10);max-width:480px;width:100%}
    .code{font-size:80px;font-weight:800;color:#0052cc;line-height:1;margin-bottom:12px}
    h2{font-size:22px;font-weight:700;color:#0d1b2a;margin-bottom:10px}
    p{color:#5e7185;font-size:15px;line-height:1.6;margin-bottom:32px}
    a{display:inline-block;background:#0052cc;color:#fff;border-radius:10px;padding:12px 28px;font-weight:600;font-size:14px;text-decoration:none;transition:background .15s}
    a:hover{background:#003d99}
  </style>
</head>
<body>
  <div class="card">
    <div class="code">{{ code }}</div>
    <h2>{% if code == 404 %}Página no encontrada{% else %}Error del servidor{% endif %}</h2>
    <p>{{ message }}</p>
    <a href="/">Volver al inicio</a>
  </div>
</body>
</html>
